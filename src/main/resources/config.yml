# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalRegen  ·  Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Blocks listed in a zone can be harvested and come back on a timer. Everything
#  else in the zone is left alone, so a protected map stays protected — the block
#  list IS the permission.
#
#  This is normally used with a protection plugin denying build in the world.
#  RoyalRegen listens after it and allows exactly these blocks, in exactly these
#  places, to be broken. Nothing else changes.
#
#  Apply changes with /royalregen reload. /royalregen status shows what is loaded.
#
#  ── THE ZONES BELOW ARE EXAMPLES ─────────────────────────────────────────────
#  Both ship DISABLED, because a cuboid only means something on the map it was
#  measured on — coordinates from someone else's world describe nothing in yours.
#  Set your own corners, then flip enabled: true.
#
#  To get the corners: stand at one corner of the area and read the coordinates
#  off the F3 debug screen (or a WorldEdit selection), then the opposite corner.
#  Order does not matter — min/max are sorted on load.
#
#  ── A NOTE ON ECONOMY ────────────────────────────────────────────────────────
#  A regen zone is an INFINITE source: every block comes back. If a shop buys what
#  it produces at a fixed minimum price, players have unlimited income at that
#  price, and no dynamic pricing fixes it because the floor is the floor.
#
#  The throttles are 'drops' (what one harvest is worth) and 'regen-seconds' (how
#  fast it comes back). Set them against what the item sells for, not by feel.
#
#  Size matters less than you would think: a field regenerating faster than anyone
#  can harvest is capped by clicking speed, not by how big it is. Price a harvest
#  by what a player earns per hour of doing it.
# ═══════════════════════════════════════════════════════════════════════════════

zones:

  # ── Example 1: a public farm ────────────────────────────────────────────────
  # The common case — a field in a hub world that players may harvest but not
  # rebuild. Everything not listed under blocks: stays protected.
  example-farm:
    enabled: false
    world: hub

    # Shown when a player walks in. Naming an area turns it from scenery into a place.
    display-name: "&aExample Field"
    discovery:
      enabled: true
      # The first visit gets this; later visits just show the display name, so a
      # regular isn't handed a card every time they cross the fence.
      title: "&6&lExample Field"
      subtitle: "&7Farming region discovered"

    # Opposite corners, inclusive. Give Y a generous range if the ground is uneven:
    # a field terraced down a hillside will sit outside a tight vertical band, and
    # the blocks that fall outside it simply will not regenerate.
    min: {x: 0,   y: 60,  z: 0}
    max: {x: 100, y: 120, z: 100}

    # How long until a harvested block returns.
    regen-seconds: 45

    # Only these are harvestable here. 'drops' is what the player gets — not the
    # block's vanilla drops — so a harvest is worth exactly what you decide.
    # 'require-mature' refuses crops that haven't finished growing.
    blocks:
      minecraft:wheat:
        drops: [WHEAT:1, WHEAT_SEEDS:1]
        require-mature: true
      minecraft:carrots:
        drops: [CARROT:2]
        require-mature: true
      minecraft:potatoes:
        drops: [POTATO:2]
        require-mature: true
      minecraft:beetroots:
        drops: [BEETROOT:1, BEETROOT_SEEDS:1]
        require-mature: true

  # ── Example 2: a mine ───────────────────────────────────────────────────────
  # Nothing here is farming-specific. A zone is a cuboid plus a block list, so the
  # same mechanism gives you a public mine — longer timers, because ore is worth
  # more per swing than wheat and comes back just as forever.
  #
  # 'require-mature' is omitted: it only means anything for crops.
  example-mine:
    enabled: false
    world: hub

    display-name: "&7Example Quarry"
    discovery:
      enabled: true
      title: "&6&lExample Quarry"
      subtitle: "&7Mining region discovered"

    min: {x: 200, y: 10, z: 200}
    max: {x: 260, y: 60, z: 260}

    regen-seconds: 120

    blocks:
      minecraft:stone:
        drops: [COBBLESTONE:1]
      minecraft:coal_ore:
        drops: [COAL:1]
      minecraft:iron_ore:
        drops: [RAW_IRON:1]
